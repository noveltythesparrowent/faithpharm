<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Faith Pharmacy | Forgot Password</title>

<style>
:root {
    --primary-color: #0d7a3e;
    --secondary-color: #065a2b;
    --accent-color: #4caf50;
    --text-color: #333;
    --light-text: #fff;
    --gray-light: #f5f7fa;
    --transition: all 0.3s ease;
}

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Poppins', -apple-system, BlinkMacSystemFont, sans-serif;
}

body {
    min-height: 100vh;
    background: var(--gray-light);
    display: grid;
    grid-template-columns: 1fr 1fr;
}

/* LEFT BRAND AREA */
.brand-section {
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    padding: 40px;
}

.brand-center {
    text-align: center;
    max-width: 440px;
    position: relative;
    z-index: 2;
}

.brand-center h1 {
    font-size: 48px;
    font-weight: 700;
    background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

.brand-center p {
    margin-top: 18px;
    font-size: 16px;
    color: #555;
}

/* Floating accents */
.float {
    position: absolute;
    font-size: 48px;
    opacity: 0.5;
    animation: float 6s ease-in-out infinite;
}

.float.one { top: 25%; left: 20%; animation-delay: 0s; }
.float.two { top: 55%; left: 15%; animation-delay: 1.5s; }
.float.three { top: 40%; left: 60%; animation-delay: 3s; }
.float.four { top: 75%; left: 75%; animation-delay: 4.5s; }
.float.five { top: 15%; left: 80%; animation-delay: 2s; }

@keyframes float {
    0% { transform: translateY(0); }
    50% { transform: translateY(-12px); }
    100% { transform: translateY(0); }
}

/* RIGHT LOGIN PANEL */
.login-panel {
    background: white;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: -10px 0 30px rgba(0,0,0,0.08);
}

.login-card {
    width: 100%;
    max-width: 420px;
}

.login-card h2 {
    font-size: 22px;
    margin-bottom: 6px;
    color: var(--primary-color);
}

.login-card span {
    font-size: 14px;
    color: #666;
}

.form-group {
    margin-top: 22px;
}

.form-group label {
    display: block;
    margin-bottom: 6px;
    font-weight: 500;
}

.form-group input {
    width: 100%;
    padding: 12px;
    border-radius: 8px;
    border: 1px solid #ddd;
    font-size: 15px;
}

.form-group input:focus {
    outline: none;
    border-color: var(--primary-color);
}

button {
    width: 100%;
    margin-top: 26px;
    padding: 14px;
    background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
    color: white;
    border: none;
    border-radius: 8px;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    transition: var(--transition);
}

button:hover { opacity: 0.95; }

.message { margin-top: 16px; font-size: 13px; text-align: center; display: none; }
.message.success { color: #1a7f37; }
.message.error { color: #065a2b; }

/* Notification Toast */
.notification {
    position: fixed;
    top: 20px;
    left: 50%;
    transform: translateX(-50%) translateY(-20px);
    background-color: #333;
    color: white;
    padding: 12px 24px;
    border-radius: 50px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.2);
    z-index: 2000;
    opacity: 0;
    transition: all 0.3s ease;
    pointer-events: none;
    font-size: 14px;
    font-weight: 500;
}
.notification.show { opacity: 1; transform: translateX(-50%) translateY(10px); }
.notification.success { background-color: #2e7d32; }
.notification.error { background-color: #c62828; }
.brand-logo {
    width: 80px;
    height: 80px;
    object-fit: contain;
    margin-bottom: 10px;
}
</style>
</head>
<body>

<div id="notification" class="notification"></div>

<div class="brand-section">
    <div class="brand-center">
        <img src="logo.png" alt="Faith Pharmacy" class="brand-logo">
        <h1>Faith Pharmacy</h1>
        <p>Recover access to your retail management dashboard.</p>
    </div>
    <div class="float one">🏬</div>
    <div class="float two">📦</div>
    <div class="float three">📊</div>
    <div class="float four">🛒</div>
    <div class="float five">💳</div>
</div>

<div class="login-panel">
    <div class="login-card">
        <h2>Reset Password</h2>
        <span>Enter your email to receive reset instructions</span>
        
        <div class="form-group">
            <label>Email</label>
            <input id="email" type="email" required placeholder="admin@footprint.com">
        </div>

        <button id="resetBtn" onclick="sendReset()">Send Reset Link</button>
        
        <div style="text-align: center; margin-top: 20px;">
            <a href="/" style="color: #666; text-decoration: none; font-size: 14px;">Back to Sign In</a>
        </div>
    </div>
</div>

<script>
    function showNotification(message, type) {
        const notif = document.getElementById('notification');
        notif.textContent = message;
        notif.className = `notification show ${type}`;
        setTimeout(() => {
            notif.className = 'notification';
        }, 3000);
    }

async function sendReset() {
        const email = document.getElementById("email").value.trim();
        if (!email) {
            showNotification('Please enter your email address.', 'error');
            return;
        }

        try {
            const res = await fetch('/forgot-password', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email })
            });

            const data = await res.json();
            if (res.ok) {
                showNotification(data.message || 'Password reset link sent!', 'success');
            } else {
                showNotification(data.message || 'Error sending reset link.', 'error');
            }
        } catch (e) {
            console.error('Error sending reset email:', e);
            showNotification('Connection error. Please try again.', 'error');
        }
    }
</script>
</body>
</html>
