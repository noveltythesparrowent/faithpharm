<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Faith Pharmacy | Reset Password</title>
    <link rel="icon" type="image/png" href="logo.png">

    <style>
        :root {
            --primary-color: #0d7a3e;
            --secondary-color: #065a2b;
            --accent-color: #4caf50;
            --text-color: #333;
            --light-text: #fff;
            --gray-light: #f5f7fa;
            --transition: all 0.3s ease;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', -apple-system, BlinkMacSystemFont, sans-serif;
        }

        body {
            min-height: 100vh;
            background: var(--gray-light);
            display: grid;
            grid-template-columns: 1fr 1fr;
        }

        /* LEFT BRAND AREA */
        .brand-section {
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            padding: 40px;
        }

        .brand-center {
            text-align: center;
            max-width: 440px;
            position: relative;
            z-index: 2;
        }

        .brand-center h1 {
            font-size: 48px;
            font-weight: 700;
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .brand-center p {
            margin-top: 18px;
            font-size: 16px;
            color: #555;
        }

        /* Floating accents */
        .float {
            position: absolute;
            font-size: 48px;
            opacity: 0.5;
            animation: float 6s ease-in-out infinite;
        }

        .float.one { top: 25%; left: 20%; animation-delay: 0s; }
        .float.two { top: 55%; left: 15%; animation-delay: 1.5s; }
        .float.three { top: 40%; left: 60%; animation-delay: 3s; }
        .float.four { top: 75%; left: 75%; animation-delay: 4.5s; }
        .float.five { top: 15%; left: 80%; animation-delay: 2s; }

        @keyframes float {
            0% { transform: translateY(0); }
            50% { transform: translateY(-12px); }
            100% { transform: translateY(0); }
        }

        /* RIGHT LOGIN PANEL */
        .login-panel {
            background: white;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: -10px 0 30px rgba(0,0,0,0.08);
        }

        .login-card {
            width: 100%;
            max-width: 420px;
        }

        .login-card h2 {
            font-size: 22px;
            margin-bottom: 6px;
            color: var(--primary-color);
        }

        .login-card span {
            font-size: 14px;
            color: #666;
        }

        .form-group {
            margin-top: 22px;
        }

        .form-group label {
            display: block;
            margin-bottom: 6px;
            font-weight: 500;
        }

        .password-wrapper { position: relative; }

        .form-group input {
            width: 100%;
            padding: 12px 40px 12px 12px;
            border-radius: 8px;
            border: 1px solid #ddd;
            font-size: 15px;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--primary-color);
        }

        /* Hide default password toggle in Edge/IE */
        input[type="password"]::-ms-reveal,
        input[type="password"]::-ms-clear {
            display: none;
        }

        .toggle-password {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: #999;
            user-select: none;
        }

        button {
            width: 100%;
            margin-top: 26px;
            padding: 14px;
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
        }

        button:hover { opacity: 0.95; }
        button:disabled { opacity: 0.7; cursor: not-allowed; }

        /* Notification Toast */
        .notification {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(-20px);
            background-color: #333;
            color: white;
            padding: 12px 24px;
            border-radius: 50px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            z-index: 2000;
            opacity: 0;
            transition: all 0.3s ease;
            pointer-events: none;
            font-size: 14px;
            font-weight: 500;
        }
        .notification.show { opacity: 1; transform: translateX(-50%) translateY(10px); }
        .notification.success { background-color: #2e7d32; }
        .notification.error { background-color: #c62828; }
        
        .brand-logo {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            object-fit: contain;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>

    <div id="notification" class="notification"></div>

    <!-- LEFT BRAND AREA -->
    <div class="brand-section">
        <div class="brand-center">
            <img src="logo.png" alt="Faith Pharmacy" class="brand-logo">
            <h1>Faith Pharmacy</h1>
            <p>Secure Point of Sale Access</p>
        </div>
        <div class="float one">🏬</div>
        <div class="float two">📦</div>
        <div class="float three">📊</div>
        <div class="float four">🛒</div>
        <div class="float five">💳</div>
    </div>

    <!-- RIGHT LOGIN PANEL -->
    <div class="login-panel">
        <div class="login-card">
            <h2>Reset Password</h2>
            <span>Create a new strong password for your account</span>

            <form id="resetForm" style="margin-top: 10px;">
                <input type="hidden" id="token" name="token">
                
                <div class="form-group">
                    <label for="password">New Password</label>
                    <div class="password-wrapper">
                        <input type="password" id="password" name="password" required placeholder="Enter strong password">
                        <span class="toggle-password" onclick="toggleVisibility('password')">👁️</span>
                    </div>
                </div>

                <div class="form-group">
                    <label for="confirmPassword">Confirm Password</label>
                    <div class="password-wrapper">
                        <input type="password" id="confirmPassword" name="confirmPassword" required placeholder="Repeat password">
                        <span class="toggle-password" onclick="toggleVisibility('confirmPassword')">👁️</span>
                    </div>
                </div>

                <button type="submit" id="submitBtn">Update Password</button>
            </form>

            <div style="text-align: center; margin-top: 20px;">
                <a href="login" style="color: #666; text-decoration: none; font-size: 14px;">Back to Sign In</a>
            </div>
        </div>
    </div>

    <script>
        function showNotification(message, type) {
            const notif = document.getElementById('notification');
            notif.textContent = message;
            notif.className = `notification show ${type}`;
            setTimeout(() => {
                notif.className = 'notification';
            }, 3000);
        }

        // 1. Handle Token from URL
        const urlParams = new URLSearchParams(window.location.search);
        let token = urlParams.get('token');

        if (!token) {
            // Fallback: try to get token from path if not in query string
            const pathSegments = window.location.pathname.split('/');
            const possibleToken = pathSegments[pathSegments.length - 1];
            if (possibleToken && possibleToken !== 'reset-password') {
                 token = possibleToken;
            }
        }

        // Sanitize token (remove potential trailing line numbers from copy-paste errors)
        if (token && token.includes(':')) {
            token = token.split(':')[0];
        }

        if (token) {
            document.getElementById('token').value = token;

            // Remove token from URL bar for cleaner look
            window.history.replaceState({}, document.title, window.location.pathname);
        } else {
            showNotification("Invalid or missing reset token.", "error");
            document.getElementById('submitBtn').disabled = true;
        }

        // 2. Toggle Password Visibility
        function toggleVisibility(fieldId) {
            const field = document.getElementById(fieldId);
            const type = field.getAttribute('type') === 'password' ? 'text' : 'password';
            field.setAttribute('type', type);
        }

        // 3. Handle Form Submission
        document.getElementById('resetForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const passwordInput = document.getElementById('password');
            const confirmInput = document.getElementById('confirmPassword');
            const password = passwordInput.value;
            const confirm = confirmInput.value;
            const tokenVal = document.getElementById('token').value;
            const btn = document.getElementById('submitBtn');

            if (password !== confirm) {
                showNotification("Passwords do not match!", "error");
                return;
            }

            if (!tokenVal) {
                showNotification("Missing reset token.", "error");
                return;
            }

            btn.textContent = "Updating...";
            btn.disabled = true;

            try {
                console.log("Sending reset request with token:", tokenVal);

                // Send token in both query string and body to ensure backend finds it
                const response = await fetch(`/api/reset-password?token=${encodeURIComponent(tokenVal)}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token: tokenVal, password: password, newPassword: password }) 
                });

                const data = await response.json();

                if (response.ok) {
                    showNotification(data.message || "Password updated successfully! Redirecting...", "success");
                    setTimeout(() => window.location.href = '/login', 2000); 
                } else {
                    showNotification(data.message || "Invalid or expired link. Please request a new one.", "error");
                    btn.textContent = "Update Password";
                    btn.disabled = false;
                }
            } catch (err) {
                console.error("Reset password error:", err);
                showNotification("Network error. Please try again.", "error");
                btn.textContent = "Update Password";
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
